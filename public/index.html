<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/FlowerBouquetLogo.png" />

    <!-- Responsive viewport — supports notched phones / iOS safe areas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Theme + appearance -->
    <meta name="theme-color" content="#C2385A" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO -->
    <meta
      name="description"
      content="Bouquet D'Amour — handcrafted fresh flower bouquets for Valentine, Birthdays, Weddings & Anniversaries. Same-day delivery across 450+ cities in India."
    />
    <meta
      name="keywords"
      content="flower bouquet, online flowers, valentine bouquet, birthday flowers, wedding flowers, anniversary bouquet, fresh flowers India, Chandigarh florist"
    />
    <meta name="author" content="Bouquet D'Amour" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bouquet D'Amour — Handcrafted Fresh Flower Bouquets" />
    <meta
      property="og:description"
      content="Fresh blooms, crafted daily, delivered with love. Custom bouquets for every occasion."
    />
    <meta property="og:image" content="%PUBLIC_URL%/FlowerBouquetLogo.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bouquet D'Amour — Handcrafted Fresh Flower Bouquets" />
    <meta
      name="twitter:description"
      content="Fresh blooms, crafted daily, delivered with love."
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Bouquet D'Amour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
